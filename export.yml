---

- name: Extract AAP artifacts to a CaC
  hosts: all
  connection: local
  gather_facts: false
  vars:
    controller_hostname: "172.16.1.45"
    controller_validate_certs: "false"
    controller_username: "{{ controller_username }}"
    controller_password: "{{ controller_password }}"

  pre_tasks:
    - name: "Setup authentication (block)"
      block:
        - debug:
            msg:  "{{ controller_hostname }} {{ controller_username }} {{ controller_password }}"
        - name: "Get the Authentication Token for the future requests"
          ansible.builtin.uri:
            url: "https://{{ controller_hostname }}/api/v2/tokens/"
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            method: POST
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            status_code: 201
          register: authtoken_res

        - name: "Set the oauth token to be used since now"
          ansible.builtin.set_fact:
            controller_oauthtoken: "{{ authtoken_res.json.token }}"
            controller_oauthtoken_url: "{{ authtoken_res.json.url }}"
      no_log: "{{ controller_configuration_filetree_create_secure_logging | default('false') }}"
      when: controller_oauthtoken is not defined

    - name: "Get the Tower/AAP instance version"
      ansible.builtin.set_fact:
        aap_version: "{{ lookup(controller_api_plugin, 'ping',
                          host=controller_hostname, oauth_token=controller_oauthtoken,
                          verify_ssl=controller_validate_certs) }}"
        # aap_version: "{{ lookup(controller_api_plugin, 'ping',
        #                   host=controller_hostname, oauth_token=controller_oauthtoken,
        #                   verify_ssl=controller_validate_certs).version }}"
  roles:
    - infra.controller_configuration.filetree_create

  post_tasks:
    - name: "Delete the Authentication Token used"
      ansible.builtin.uri:
        url: "https://{{ controller_hostname }}{{ controller_oauthtoken_url }}"
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        method: DELETE
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        status_code: 204
      when: controller_oauthtoken_url is defined